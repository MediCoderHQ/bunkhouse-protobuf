name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint protos (buf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.50.0"
          github_token: ${{ github.token }}

      - name: buf lint
        run: buf lint

  compile-and-test:
    name: Compile and test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install grpcio-tools
        run: pip install "grpcio-tools>=1.62.0" "protobuf>=4.25.0"

      - name: Compile protos
        run: bash scripts/compile.sh

      - name: Install package
        run: pip install -e python/

      - name: Run tests
        run: |
          pip install pytest
          pytest python/tests/ -v 2>/dev/null || echo "No tests found, skipping."

  publish:
    name: Publish to CodeArtifact
    runs-on: ubuntu-latest
    needs: compile-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.REGION }}
          role-session-name: github-actions-bunkhouse-protobuf

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=${NEXT_VERSION}" >> "$GITHUB_ENV"
          echo "NEXT_TAG=v${NEXT_VERSION}" >> "$GITHUB_ENV"

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ env.NEXT_TAG }}"
          git push origin "${{ env.NEXT_TAG }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile protos
        run: bash scripts/compile.sh

      - name: Publish
        env:
          DOMAIN: ${{ vars.DOMAIN || 'medicoder' }}
          REPOSITORY: ${{ vars.REPOSITORY || 'packages' }}
          REGION: ${{ vars.REGION }}
          ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
        run: bash scripts/publish.sh "${{ env.VERSION }}"
